<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <defs>
    <linearGradient id="sq-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DA3FF"/>
      <stop offset="100%" stop-color="#1B6EF3"/>
    </linearGradient>
    <linearGradient id="sq-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B6EF3"/>
      <stop offset="100%" stop-color="#0D3B8E"/>
    </linearGradient>
  </defs>
  <!-- 4-square grid icon -->
  <!-- top-left: dark -->
  <rect x="0" y="0" width="28" height="28" rx="6" fill="url(#sq-dark)"/>
  <!-- top-right: light gradient -->
  <rect x="32" y="0" width="28" height="28" rx="6" fill="url(#sq-grad)"/>
  <!-- bottom-left: medium -->
  <rect x="0" y="32" width="28" height="28" rx="6" fill="#1565C0" opacity="0.7"/>
  <!-- bottom-right: dark -->
  <rect x="32" y="32" width="28" height="28" rx="6" fill="url(#sq-dark)" opacity="0.85"/>
  <!-- "Income" text -->
  <text x="76" y="42" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5" fill="#0A1628">Income</text>
  <!-- "OS" badge -->
  <rect x="196" y="14" width="48" height="32" rx="6" fill="#1B6EF3"/>
  <text x="220" y="37" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">OS</text>
</svg>